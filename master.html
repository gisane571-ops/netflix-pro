<body style="background:black;color:white">

<h1 style="color:red">PAINEL MASTER SUPREMO</h1>

<input id="nome" placeholder="Nome do filme">
<input id="link" placeholder="Link do filme">

<button onclick="addFilme()">Adicionar</button>

<hr>

<div id="lista"></div>

<script>

const supabaseUrl = "https://jsnpcyezfrpvdhjvhsxz.supabase.co"
const supabaseKey = "COLE_SUA_KEY_AQUI"

const supabase = window.supabase.createClient(
supabaseUrl,
supabaseKey
)

async function addFilme(){

let nome = document.getElementById("nome").value
let link = document.getElementById("link").value

await supabase
.from("filmes")
.insert([{ nome, link }])

carregar()

}

async function carregar(){

let { data } = await supabase
.from("filmes")
.select("*")

let html = ""

data.forEach(f=>{

html += `
<div>
${f.nome}
<button onclick="rem(${f.id})">X</button>
</div>
`

})

document.getElementById("lista").innerHTML = html

}

async function rem(id){

await supabase
.from("filmes")
.delete()
.eq("id", id)

carregar()

}

carregar()

</script>

</body>
