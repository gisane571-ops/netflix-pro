<!DOCTYPE html>
<html>
<head>
<title>MASTER CONTROL</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
margin:0;
}

.topo{
background:#001100;
padding:15px;
font-size:25px;
text-align:center;
border-bottom:2px solid #00ff00;
}

.menu{
width:200px;
height:100vh;
background:#000;
float:left;
border-right:2px solid #00ff00;
}

.menu button{
width:100%;
padding:10px;
background:black;
color:#00ff00;
border:none;
border-bottom:1px solid #00ff00;
cursor:pointer;
}

.tela{
margin-left:200px;
padding:20px;
}

input{
background:black;
color:#00ff00;
border:1px solid #00ff00;
padding:5px;
}

button{
background:black;
color:#00ff00;
border:1px solid #00ff00;
padding:5px;
}

</style>

</head>

<body>

<div class="topo">
MASTER CONTROL PANEL
</div>

<div class="menu">

<button onclick="mostrar('dash')">DASHBOARD</button>
<button onclick="mostrar('user')">USUARIOS</button>
<button onclick="mostrar('filme')">FILMES</button>
<button onclick="mostrar('upload')">UPLOAD</button>

</div>

<div class="tela" id="tela">

<h2>Bem vindo DONO</h2>

</div>

<script>

function mostrar(x){

if(x=="dash"){
tela.innerHTML="<h2>DASHBOARD</h2>"
}

if(x=="user"){
tela.innerHTML="<h2>USUARIOS</h2>"
}

if(x=="filme"){
tela.innerHTML="<h2>FILMES</h2>"
}

if(x=="upload"){
tela.innerHTML=`
<h2>UPLOAD</h2>

<input id="nome" placeholder="nome">
<input id="link" placeholder="link video">

<button onclick="salvar()">SALVAR</button>

`
}

}

</script>

</body>
</html>
