<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CORE AI ROBÔ</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
margin:0;
}

header{
background:#111;
padding:10px;
}

button{
background:black;
color:#00ff00;
border:1px solid #00ff00;
padding:5px;
}

#console{
height:300px;
overflow:auto;
border:1px solid #00ff00;
margin:10px;
padding:5px;
}

input{
width:80%;
background:black;
color:#00ff00;
border:1px solid #00ff00;
}

</style>

</head>

<body>

<header>

<h2>CORE AI CONTROL</h2>

<button onclick="send('scan')">SCAN</button>
<button onclick="send('edit')">EDIT</button>
<button onclick="send('data')">DATA</button>

</header>

<div id="console">

> online

</div>

<input id="cmd">
<button onclick="exec()">EXEC</button>

<script>

API="https://SEU-SERVIDOR.onrender.com/cmd"

function log(t){

let c=document.getElementById("console")

c.innerHTML+="<br>"+t

c.scrollTop=c.scrollHeight

}

function send(c){

log("> "+c)

fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({cmd:c})
})
.then(r=>r.json())
.then(d=>log(d.res))
}

function exec(){

let v=document.getElementById("cmd").value

send(v)

}

</script>

</body>
</html>
