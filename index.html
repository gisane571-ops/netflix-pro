<script>

const API_URL = "https://SEU-SERVIDOR.onrender.com/cmd"


function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('closed');
}


function runCmd(type, msg) {

    printLog(msg, 'accent');

    fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            command: type
        })
    })
    .then(r => r.json())
    .then(data => {

        printLog("Servidor respondeu: " + data.reply, "success")
        addToMemory(type + " OK")

    })
    .catch(err => {
        printLog("ERRO servidor", "dim")
    })

}


function manualExec() {

    const input = document.getElementById('user-input');

    if(input.value.trim() === "") return

    const ordem = input.value

    printLog("ENVIANDO: " + ordem, "white")


    fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            command: ordem
        })
    })
    .then(r => r.json())
    .then(data => {

        printLog(data.reply, "success")
        addToMemory(ordem)

    })
    .catch(err => {
        printLog("ERRO API", "dim")
    })


    input.value = ""

}


function printLog(text, style) {

    const consoleEl = document.getElementById('console');

    const line = document.createElement('div');

    let color = "#94a3b8";

    if(style === 'accent') color = "#38bdf8";
    if(style === 'success') color = "#10b981";
    if(style === 'white') color = "#ffffff";
    if(style === 'dim') color = "#475569";

    line.innerHTML =
    `[${new Date().toLocaleTimeString()}] 
    <span style="color:${color}">> ${text}</span>`

    consoleEl.appendChild(line)

    consoleEl.scrollTop = consoleEl.scrollHeight

}


function addToMemory(text) {

    const mem = document.getElementById('memory-log');

    const item = document.createElement('div');
